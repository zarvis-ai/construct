# Example construct config.
#
# Drop this at $CONSTRUCT_CONFIG_DIR/config.toml (default
# ~/.config/construct/config.toml). All built-in adapters (shell, claude,
# codex, antigravity, grok, smith) are registered automatically — no config needed.

# Override the child command a built-in adapter launches without writing a
# wrapper script. `CONSTRUCT_*_CMD` is split shell-style (quotes/backslashes
# only; no shell expansion) and prepended before the adapter's generated
# arguments. This wins over the binary-only `CONSTRUCT_*_BIN` env var.
#
# [adapters.codex]
# env = { CONSTRUCT_CODEX_CMD = "exec codex" }
#
# Other built-ins use CONSTRUCT_CLAUDE_CMD, CONSTRUCT_ANTIGRAVITY_CMD,
# CONSTRUCT_GROK_CMD, and CONSTRUCT_SHELL_CMD.

# Add a custom adapter — just point to any binary that speaks the AHP
# protocol. See `crates/protocol/src/adapter.rs` for the SDK helper.
#
# [adapters.aider]
# binary = "construct-adapter-aider"
# description = "Aider (community adapter)"

[defaults]
# When true, every new session whose cwd is a git repo gets its own
# `git worktree add`-style isolated copy. Override per-session with
# `construct new ... --worktree`.
worktree = false

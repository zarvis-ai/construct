name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install agg
        # agg turns the TUI smoke's asciinema .cast into a GIF for
        # reviewers to replay interactively from the workflow run page.
        run: |
          curl -sSfL -o /usr/local/bin/agg \
            https://github.com/asciinema/agg/releases/latest/download/agg-x86_64-unknown-linux-gnu
          chmod +x /usr/local/bin/agg

      - name: Install ffmpeg
        # ffmpeg assembles the web smoke's CDP-captured JPEG frames
        # into an MP4. continue-on-error so a slow apt mirror doesn't
        # block the build and tests.
        continue-on-error: true
        timeout-minutes: 15
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q --no-install-recommends ffmpeg

      - name: Build
        run: cargo build --workspace --all-targets --locked

      - name: Test
        # pty_render perf-budget tests assert hardware-dependent timings
        # tuned for local dev (Apple Silicon). On the shared 2-core
        # GitHub runner they exceed budget even with no code changes,
        # so they're skipped in CI. Run them locally with `cargo test`
        # to catch real regressions.
        run: |
          cargo test --workspace --locked -- \
            --skip pty_render::tests::codex_initial_render_after_restart_is_bounded \
            --skip pty_render::tests::many_pinned_sessions_resize_within_budget \
            --skip pty_render::tests::pseudo_terminal_render_is_fast_per_frame \
            --skip pty_render::tests::codex_resize_bound_is_reasonable \
            --skip pty_render::tests::smith_steady_state_render_is_cheap_with_many_items \
            --skip pty_render::tests::smith_tool_expand_collapse_rebuilds_only_retained_suffix

      - name: Render TUI casts to GIFs
        if: always()
        run: |
          for cast in target/e2e-artifacts/*.cast; do
            [ -f "$cast" ] || continue
            agg "$cast" "${cast%.cast}.gif" || echo "agg failed for $cast"
          done

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: target/e2e-artifacts/
          if-no-files-found: ignore
          retention-days: 30

    if (Math.abs(velocity) >= 0.02) inertiaFrame = requestAnimationFrame(tick);
  };

  host.addEventListener("touchstart", (ev) => {
    if (ev.touches.length !== 1) return;
    stopInertia();
    active = true;
    lastY = ev.touches[0].clientY;
    lastT = performance.now();
    velocity = 0;
    carryPx = 0;
    ev.stopPropagation();
  }, { passive: true });

  host.addEventListener("touchmove", (ev) => {
    if (!active || ev.touches.length !== 1) return;
    const y = ev.touches[0].clientY;
    const now = performance.now();
    const dy = lastY - y;
    const dt = Math.max(1, now - lastT);
    lastY = y;
    lastT = now;
    velocity = dy / dt;
    scrollPixels(dy);
    ev.preventDefault();
    ev.stopPropagation();
  }, { passive: false });

  host.addEventListener("touchend", (ev) => {
    if (!active) return;
    active = false;
    ev.stopPropagation();
    beginInertia();
  }, { passive: true });
  host.addEventListener("touchcancel", () => {
    active = false;
    stopInertia();
  }, { passive: true });

  // Test hook: lets the web smoke assert the custom momentum scroller is
  // installed without poking at browser-private event listener internals.
  window.__agentdTerminalMomentumScroll = true;
}

function initTerminalScrollButtons() {
  if (window.__agentdTerminalScrollButtons) return;
  const stop = (ev) => {
    ev.preventDefault();
    ev.stopPropagation();
  };
  terminalTopBtn.addEventListener("click", (ev) => {
    stop(ev);
    cancelResizeFollowBottom();
    if (state.term) state.term.scrollToTop();
    state.term && state.term.focus();
  });
  terminalBottomBtn.addEventListener("click", (ev) => {
    stop(ev);
    if (state.term) state.term.scrollToBottom();
    state.term && state.term.focus();
  });
  for (const btn of [terminalTopBtn, terminalBottomBtn]) {
    btn.addEventListener("touchstart", (ev) => ev.stopPropagation(), { passive: true });
    btn.addEventListener("touchmove", stop, { passive: false });
  }
  window.__agentdTerminalScrollButtons = true;
}

function createTerminalHandle(id) {
  const host = document.createElement("div");
  host.className = "terminal-host";
  host.hidden = true;
  host.dataset.sessionId = id;
  terminalEl.appendChild(host);

  const term = new window.Terminal({
    fontFamily: "ui-monospace, SFMono-Regular, Menlo, Consolas, monospace",
    fontSize: 13,
    convertEol: false,
    cursorBlink: true,
    // Mobile-friendly defaults; the daemon controls actual PTY size
    // via `session.pty_resize` after we report the fit.
    scrollback: 4000,
    // Match the TUI's Matrix-inspired palette so terminal-mode
    // sessions feel like the desktop terminal rather than a native
    // browser widget.
    theme: {
      background: "#020805",
      foreground: "#beffcd",
      cursor: "#39ff88",
      cursorAccent: "#06160c",
      selectionBackground: "#1c4e2a",
      black: "#020805",
      red: "#ff5f5a",
      green: "#7dff73",
      yellow: "#ffd75c",
      blue: "#5ce1ff",
      magenta: "#ff7ad9",
      cyan: "#5ce1ff",
      white: "#beffcd",
      brightBlack: "#20703a",
      brightRed: "#ff8b86",
      brightGreen: "#39ff88",
      brightYellow: "#ffe58a",
      brightBlue: "#8aeaff",
      brightMagenta: "#ffa6e4",
      brightCyan: "#8aeaff",
      brightWhite: "#e1ffe6",
    },
  });
  const fitAddon = new window.FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(host);

  const handle = {
    id,
    host,
    term,
    fitAddon,
    loaded: false,
    ptyBuffer: [],
    ptyBuffering: false,
    lastReportedSize: { cols: 0, rows: 0 },
  };
  state.terminalById.set(id, handle);

  // Forward user keystrokes (and pasted text) as base64-encoded
  // PTY input. xterm's onData yields a JS string of UTF-8
  // codepoints; we re-encode through TextEncoder so multi-byte
  // input round-trips cleanly.
  term.onData((s) => {
    if (state.mode !== "terminal" || state.currentId !== id) return;
    claimTerminalGeometryNow();
    const data = encodeBase64Utf8(s);
    rpc("session.pty_input", { session_id: id, data })
      .catch((e) => console.error("pty_input failed:", e));
  });

  // Refit when the terminal host changes size. Only the active xterm
  // claims daemon PTY geometry; hidden cached terminals just keep their
  // local dimensions ready for instant reveal.
  new ResizeObserver(() => {
    if (state.currentId === id) refitTerminal();
  }).observe(host);

  host.addEventListener("wheel", (ev) => {
    if (state.currentId !== id) return;
    cancelResizeFollowBottom();
    ev.stopPropagation();
  }, { passive: true });

  installTerminalScrollContainment(host, term, id);

  // Tapping the terminal area focuses xterm's helper textarea, which
  // is what summons the soft keyboard on iOS/Android.
  host.addEventListener("click", () => {
    if (state.currentId !== id) return;
    noteWebPtyEngagement();
    refitTerminal({ claim: true, immediate: true });
    term.focus();
  });

  return handle;
}

function activateTerminalHandle(handle) {
  state.term = handle.term;
  state.fitAddon = handle.fitAddon;
  state.ptyBuffer = handle.ptyBuffer;
  state.ptyBuffering = handle.ptyBuffering;
  state.lastReportedSize = handle.lastReportedSize || { cols: 0, rows: 0 };
}

function initTerminalForSession(id) {
  return terminalHandleForSession(id) || createTerminalHandle(id);
}

if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", refitTerminal);
}

initTerminalScrollButtons();

function noteWebPtyEngagement() {
  state.webPtyEngagedUntil = performance.now() + WEB_PTY_ENGAGEMENT_MS;
}

function webPtyRecentlyEngaged() {
  return performance.now() <= state.webPtyEngagedUntil;
}

function refitTerminal(options = {}) {
  if (!state.term || !state.fitAddon) return;
  if (state.mode !== "terminal") return;
  const claim = !!options.claim;
  const immediate = !!options.immediate;
  if (claim) noteWebPtyEngagement();
  const wasAtBottom = terminalIsAtBottom();
  if (!fitTerminalPreservingScroll(wasAtBottom)) return;
  const cols = state.term.cols;
  const rows = state.term.rows;
  if (!cols || !rows) return;
  if (!wasAtBottom) state.resizeFollowBottomUntil = 0;
  const colsChanged = cols !== state.lastReportedSize.cols;
  const rowsChanged = rows !== state.lastReportedSize.rows;
  if (!colsChanged && !rowsChanged) {
    return;
  }
  if (!claim && !webPtyRecentlyEngaged()) {
    // Passive browser layout churn (background tab, phone keyboard,
    // viewport settle) should refit local xterm but must not steal the
    // single OS PTY geometry from an active TUI. Once the web terminal
    // is clicked/typed into, recent engagement lets row-only changes
    // claim the PTY too, keeping full-screen apps like codex aligned.
    state.resizeFollowBottomUntil = 0;
    return;
  }
  if (immediate) {
    sendTerminalPtyResize(cols, rows, wasAtBottom);
  } else {
    scheduleTerminalPtyResize(cols, rows, wasAtBottom);
  }
}

function scheduleTerminalPtyResize(cols, rows, wasAtBottom) {
  state.pendingPtyResize = { sessionId: state.currentId, cols, rows, wasAtBottom };
  state.lastReportedSize = { cols, rows };
  if (state.ptyResizeTimer) clearTimeout(state.ptyResizeTimer);
  state.ptyResizeTimer = setTimeout(() => {
    state.ptyResizeTimer = null;
    const pending = state.pendingPtyResize;
    state.pendingPtyResize = null;
    if (!pending) return;
    sendTerminalPtyResize(pending.cols, pending.rows, pending.wasAtBottom, pending.sessionId);
  }, WEB_PTY_RESIZE_DEBOUNCE_MS);
}

function sendTerminalPtyResize(cols, rows, wasAtBottom, sessionId = state.currentId) {
  state.lastReportedSize = { cols, rows };
  if (!sessionId || sessionId !== state.currentId) return;
  if (wasAtBottom) state.resizeFollowBottomUntil = performance.now() + 1500;
  rpc("session.pty_resize", { session_id: sessionId, cols, rows })
    .catch((e) => console.warn("pty_resize failed:", e));
}

function claimTerminalGeometryNow() {
  refitTerminal({ claim: true, immediate: true });
}

function terminalIsAtBottom() {
  const active = state.term && state.term.buffer && state.term.buffer.active;
  return !!active && active.viewportY >= active.baseY;
}

function restoreTerminalBottom(wasAtBottom) {
  if (!wasAtBottom || !state.term) return;
  restoreTerminalBottomFor(state.term);
}

function restoreTerminalBottomFor(term) {
  if (!term) return;
  term.scrollToBottom();
  // xterm/addon-fit can finish DOM measurements after the current
  // call stack; repeat once on the next frame so sheet/menu reflows
  // do not leave a bottom-following terminal several pages up.
  requestAnimationFrame(() => {
    if (state.term === term) term.scrollToBottom();
  });
}

function fitTerminalPreservingScroll(wasAtBottom = terminalIsAtBottom()) {
  try {
    state.fitAddon.fit();
  } catch (_) {
    return false;
  }
  restoreTerminalBottom(wasAtBottom);
  return true;
}

function shouldFollowResizeBottom() {
  return performance.now() <= state.resizeFollowBottomUntil;
}

function cancelResizeFollowBottom() {
  state.resizeFollowBottomUntil = 0;
}

function writeLivePtyToTerm(bytes) {
  if (!state.term) return;
  const term = state.term;
  const followBottom = shouldFollowResizeBottom();
  if (!followBottom) {
    term.write(bytes);
    return;
  }
  term.write(bytes, () => {
    if (state.term === term) restoreTerminalBottomFor(term);
  });
  restoreTerminalBottomFor(term);
}

function encodeBase64Utf8(s) {
  const bytes = new TextEncoder().encode(s);
  let bin = "";
  // Build a latin-1 binary string (each char 0..255) so btoa accepts
  // it. Looping bytewise is fine for typical keystroke / paste sizes.
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

// --- Virtual keyboard ---------------------------------------------------
//
// On-screen QWERTY + symbols + special-keys row for PTY-mode
// sessions. The OS soft keyboard is unreliable in a WebSocket-
// driven page (focus on a `<canvas>` doesn't summon it on iOS,
// xterm.js's helper textarea is a div), so we ship our own.
//
// Layout is config-driven (see VKBD_LAYERS); rendering generates
// a `<button>` per key. Each button carries either `data-char`
// (literal character to send) or `data-key` (named special key
// dispatched through KEYBAR_BYTES / SPECIAL_HANDLERS).

/** Top row — special keys + Ctrl/Alt modifiers + common Ctrl
 *  combos. Modifier buttons (`ctrl`, `alt`) work like Shift —
 *  3-state cycle (off → next → lock → off) — but they apply to
 *  the next *letter* typed on the main keyboard (Ctrl+letter
 *  produces the corresponding control byte; Alt+letter prepends
 *  ESC). Tapping Ctrl/Alt also auto-expands the keyboard if
 *  minimized, since the modifier is useless without a letter
 *  visible to tap. */
const VKBD_SPECIAL = [
  { key: "esc", label: "Esc" },
  { key: "tab", label: "Tab" },
  { key: "ctrl", label: "Ctrl" },
  { key: "alt", label: "Alt" },
  { key: "up", label: "↑" },
  { key: "down", label: "↓" },
  { key: "left", label: "←" },
  { key: "right", label: "→" },
  { key: "cc", label: "^C" },
  { key: "cd", label: "^D" },
  { key: "cz", label: "^Z" },
  { key: "cl", label: "^L" },
  { key: "ca", label: "^A" },
  { key: "ce", label: "^E" },
  { key: "ck", label: "^K" },
];

/** Byte sequences for named keys (top row + main-row specials). */
const KEYBAR_BYTES = {
  esc: "\x1b",
  tab: "\t",
  up: "\x1b[A",
  down: "\x1b[B",
  left: "\x1b[D",
  right: "\x1b[C",
  cc: "\x03",
  cd: "\x04",
  cz: "\x1a",
  cl: "\x0c",
  ca: "\x01",
  ce: "\x05",
  ck: "\x0b",
  // Main-keyboard special keys.
  enter: "\r",
  backspace: "\x7f",
  space: " ",
};

/**
 * Main keyboard layouts. Each row is an array of cell descriptors.
 *
 * Cells are either:
 *   - a literal single-character string ("q", "1", ".") → tap
 *     sends that character (uppercased if shift is on for letter
 *     keys).
 *   - an object `{ key, label, class?, ... }` for special keys.
 *
 * Two layers: letters (default) and symbols (123 toggle). Keeping
 * it to two layers avoids the "where did `?` go" maze of a
 * three-layer iOS keyboard.
 */
const VKBD_LAYERS = {
  letters: [
    ["q", "w", "e", "r", "t", "y", "u", "i", "o", "p"],
    ["a", "s", "d", "f", "g", "h", "j", "k", "l"],
    [
      { key: "shift", label: "⇧", class: "modifier" },
      "z", "x", "c", "v", "b", "n", "m",
      { key: "backspace", label: "⌫" },
    ],
    [
      { key: "layer-symbols", label: "123", class: "modifier" },
      { key: "space", label: " ", class: "xwide" },
      { key: "enter", label: "⏎" },
    ],
  ],
  symbols: [
    ["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"],
    ["-", "/", ":", ";", "(", ")", "$", "&", "@", "\""],
    [
      { key: "shift", label: "#+=", class: "modifier" },
      ".", ",", "?", "!", "'", "*", "+",
      { key: "backspace", label: "⌫" },
    ],
    [
      { key: "layer-letters", label: "abc", class: "modifier" },
      { key: "space", label: " ", class: "xwide" },
      { key: "enter", label: "⏎" },
    ],
  ],
  // Third layer reached via shift in symbols mode. Just enough to
  // cover the rest of the printable ASCII set without making the
  // user hunt.
  more: [
    ["~", "`", "|", "\\", "{", "}", "[", "]", "<", ">"],
    ["_", "=", "+", "^", "%", "#"],
    [
      { key: "shift", label: "123", class: "modifier" },
      "(", ")", "/", "?", ":", ";",
      { key: "backspace", label: "⌫" },
    ],
    [
      { key: "layer-letters", label: "abc", class: "modifier" },
      { key: "space", label: " ", class: "xwide" },
      { key: "enter", label: "⏎" },
    ],
  ],
};

const vkbd = {
  layer: "letters",
  // Three independent modifier state machines. Each cycles
  // `off → next → lock → off` on tap, mirroring iOS's
  // tap-shift-twice-for-caps-lock pattern. `next` is consumed by
  // the next character typed; `lock` persists. Combinations are
  // supported (Ctrl+Alt+letter → ESC + Ctrl-letter).
  //
  // From the *symbols* layer, the shift button instead toggles
  // between symbols and the `more` layer — shift-as-modifier
  // doesn't apply outside letters.
  shift: "off",
  ctrl: "off",
  alt: "off",
  // Default minimized so the keyboard doesn't immediately occupy
  // half the screen. The user expands when they need to type a
  // letter; tapping Ctrl / Alt auto-expands too. The minimize
  // state is shown via the `.vkbd.minimized` class on the root.
  minimized: true,
};

/** Apply active modifiers to a base character and return the
 *  byte sequence to send. Shift uppercases ASCII letters. Ctrl
 *  converts A–Z to control bytes (Ctrl+A=0x01 … Ctrl+Z=0x1A).
 *  Alt prepends ESC (xterm's meta-prefix convention). */
function applyVkbdModifiers(ch) {
  const shiftOn = vkbd.shift === "next" || vkbd.shift === "lock";
  const ctrlOn = vkbd.ctrl === "next" || vkbd.ctrl === "lock";
  const altOn = vkbd.alt === "next" || vkbd.alt === "lock";
  let out = ch;
  if (shiftOn && /^[a-z]$/.test(out)) out = out.toUpperCase();
  if (ctrlOn && /^[a-zA-Z]$/.test(out)) {
    const code = out.toUpperCase().charCodeAt(0) - 64;
    out = String.fromCharCode(code);
  }
  if (altOn) out = "\x1b" + out;
  return out;
}

/** Reset any modifier still in the `next` state after it's been
 *  consumed by a character. `lock` modifiers stay active. */
function consumeNextVkbdModifiers() {
  if (vkbd.shift === "next") vkbd.shift = "off";
  if (vkbd.ctrl === "next") vkbd.ctrl = "off";
  if (vkbd.alt === "next") vkbd.alt = "off";
}

function cycleModifierState(s) {
  return s === "off" ? "next" : s === "next" ? "lock" : "off";
}

/** Send a synthetic PTY input chunk — same code path as
 *  `term.onData`, used by the virtual keyboard to fire bytes
 *  the user typed on-screen. */
function sendPtyBytes(s) {
  if (!state.currentId || state.mode !== "terminal") return;
  claimTerminalGeometryNow();
  const data = encodeBase64Utf8(s);
  rpc("session.pty_input", { session_id: state.currentId, data })
    .catch((e) => console.warn("vkbd pty_input failed:", e));
}

/** Rebuild the keyboard markup from VKBD_SPECIAL + the current
 *  layer in VKBD_LAYERS. Idempotent; called on terminal-mode
 *  enter and on every layer / modifier / minimize change. */
function renderVirtualKeyboard() {
  // Root visibility class — drives `.vkbd.minimized` CSS rule
  // that hides the main rows.
  vkbdEl.classList.toggle("minimized", vkbd.minimized);
  // Toggle glyph: ▾ shows "minimize me" (visible when expanded),
  // ▴ shows "expand me" (visible when minimized).
  const toggleEl = $("vkbdToggle");
  if (toggleEl) toggleEl.textContent = vkbd.minimized ? "▴" : "▾";

  // Special row — highlight Ctrl/Alt when armed/locked so the
  // user can see modifier state at a glance.
  vkbdSpecialEl.innerHTML = VKBD_SPECIAL.map((k) => {
    let modOn = "";
    if (k.key === "ctrl" && vkbd.ctrl !== "off") modOn = "on";
    if (k.key === "alt" && vkbd.alt !== "off") modOn = "on";
    const cls = ["vk", k.key === "ctrl" || k.key === "alt" ? "modifier" : "", modOn]
      .filter(Boolean)
      .join(" ");
    return `<button type="button" class="${cls}" data-key="${attr(k.key)}">${escape(k.label)}</button>`;
  }).join("");

  // Main rows — current layer (skipped from DOM update when
  // minimized; harmless but saves a few microseconds).
  const rows = VKBD_LAYERS[vkbd.layer] || VKBD_LAYERS.letters;
  const isLetters = vkbd.layer === "letters";
  const shiftOn = vkbd.shift === "next" || vkbd.shift === "lock";
  vkbdMainEl.innerHTML = rows
    .map((row) => {
      const cells = row
        .map((cell) => {
          if (typeof cell === "string") {
            const display = isLetters && shiftOn ? cell.toUpperCase() : cell;
            return `<button type="button" class="vk" data-char="${attr(display)}">${escape(display)}</button>`;
          }
          // Object cell.
          const cls = ["vk", cell.class || ""].filter(Boolean).join(" ");
          // Highlight modifiers when armed/locked.
          const modOn = cell.key === "shift" && shiftOn ? "on" : "";
          return `<button type="button" class="${cls} ${modOn}" data-key="${attr(cell.key)}">${escape(cell.label)}</button>`;
        })
        .join("");
      return `<div class="vkbd-row">${cells}</div>`;
    })
    .join("");
}

/** Handle a virtual-keyboard tap. Dispatches by attribute:
 *  `data-char` → literal character (with modifiers applied);
 *  `data-key` → named special key (modifier toggle, layer
 *  switch, or KEYBAR_BYTES lookup). */
function handleVkbdClick(ev) {
  // Minimize toggle lives outside the .vk button family so it
  // gets its own check first.
  if (ev.target.id === "vkbdToggle") {
    vkbd.minimized = !vkbd.minimized;
    renderVirtualKeyboard();
    return;
  }
  const btn = ev.target.closest(".vk");
  if (!btn) return;
  // Literal character → apply modifiers, send, consume `next`
  // states.
  if (btn.dataset.char !== undefined) {
    const baseCh = vkbd.layer === "letters" ? btn.dataset.char.toLowerCase() : btn.dataset.char;
    sendPtyBytes(applyVkbdModifiers(baseCh));
    consumeNextVkbdModifiers();
    renderVirtualKeyboard();
    return;
  }
  // Named special key.
  const k = btn.dataset.key;
  if (!k) return;
  switch (k) {
    case "shift":
      // 3-state cycle in letters. In symbols, the shift button
      // toggles between symbols and `more` layers — that's its
      // role in the existing iOS-style layout.
      if (vkbd.layer === "symbols") {
        vkbd.layer = "more";
      } else if (vkbd.layer === "more") {
        vkbd.layer = "symbols";
      } else {
        vkbd.shift = cycleModifierState(vkbd.shift);
      }
      renderVirtualKeyboard();
      return;
    case "ctrl":
      vkbd.ctrl = cycleModifierState(vkbd.ctrl);
      // The modifier has no effect on the special row itself —
      // it applies to the next letter on the main keyboard, which
      // is hidden when minimized. Auto-expand on activate so the
      // user can immediately reach a letter.
      if (vkbd.ctrl !== "off") vkbd.minimized = false;
      renderVirtualKeyboard();
      return;
    case "alt":
      vkbd.alt = cycleModifierState(vkbd.alt);
      if (vkbd.alt !== "off") vkbd.minimized = false;
      renderVirtualKeyboard();
      return;
    case "layer-symbols":
      vkbd.layer = "symbols";
      vkbd.shift = "off";
      renderVirtualKeyboard();
      return;
    case "layer-letters":
      vkbd.layer = "letters";
      vkbd.shift = "off";
      renderVirtualKeyboard();
      return;
    default: {
      const bytes = KEYBAR_BYTES[k];
      if (bytes !== undefined) sendPtyBytes(bytes);
      return;
    }
  }
}

if (vkbdEl) {
  vkbdEl.addEventListener("click", handleVkbdClick);
}

function isNarrowLayout() {
  return window.matchMedia("(max-width: 720px)").matches;
}

function clampSessionListWidth(width) {
  const maxByViewport = Math.max(
    SESSION_LIST_MIN_WIDTH,
    Math.min(SESSION_LIST_MAX_WIDTH, Math.floor(window.innerWidth * 0.65))
  );
  return Math.max(SESSION_LIST_MIN_WIDTH, Math.min(width, maxByViewport));
}

function setSessionListWidth(width, persist = true) {
  const clamped = clampSessionListWidth(width);
  mainEl.style.setProperty("--session-list-width", `${clamped}px`);
  if (sessionListResizerEl) {
    sessionListResizerEl.setAttribute("aria-valuemin", String(SESSION_LIST_MIN_WIDTH));
    sessionListResizerEl.setAttribute("aria-valuemax", String(clampSessionListWidth(9999)));
    sessionListResizerEl.setAttribute("aria-valuenow", String(clamped));
  }
  if (persist) localStorage.setItem(SESSION_LIST_WIDTH_KEY, String(clamped));
  return clamped;
}

function setSessionListVisible(visible, persist = true) {
  if (isNarrowLayout()) {
    sessionListEl.classList.toggle("collapsed", !visible);
  } else {
    mainEl.classList.toggle("session-list-hidden", !visible);
    sessionListEl.classList.remove("collapsed");
    if (visible) setSessionListWidth(currentSessionListWidth(), false);
  }
  toggleListBtn.setAttribute("aria-expanded", visible ? "true" : "false");
  toggleListBtn.title = visible ? "hide session list" : "show session list";
  if (persist) localStorage.setItem(SESSION_LIST_VISIBLE_KEY, visible ? "1" : "0");
  if (state.mode === "terminal") requestAnimationFrame(refitTerminal);
}

function isSessionListVisible() {
  return isNarrowLayout()
    ? !sessionListEl.classList.contains("collapsed")
    : !mainEl.classList.contains("session-list-hidden");
}

function currentSessionListWidth() {
  const stored = Number(localStorage.getItem(SESSION_LIST_WIDTH_KEY));
  if (Number.isFinite(stored) && stored > 0) return stored;
  return SESSION_LIST_DEFAULT_WIDTH;
}

function initSessionListLayout() {
  setSessionListWidth(currentSessionListWidth(), false);
  const storedVisible = localStorage.getItem(SESSION_LIST_VISIBLE_KEY);
  setSessionListVisible(storedVisible !== "0", false);
}

initSessionListLayout();

toggleListBtn.addEventListener("click", () => {
  setSessionListVisible(!isSessionListVisible());
});

if (sessionListResizerEl) {
  sessionListResizerEl.addEventListener("pointerdown", (ev) => {
    if (isNarrowLayout() || !isSessionListVisible()) return;
    ev.preventDefault();
    sessionListResizerEl.classList.add("is-dragging");
    sessionListResizerEl.setPointerCapture(ev.pointerId);
    const onMove = (moveEv) => setSessionListWidth(moveEv.clientX);
    const onEnd = () => {
      sessionListResizerEl.classList.remove("is-dragging");
      sessionListResizerEl.removeEventListener("pointermove", onMove);
      sessionListResizerEl.removeEventListener("pointerup", onEnd);
      sessionListResizerEl.removeEventListener("pointercancel", onEnd);
      if (state.mode === "terminal") requestAnimationFrame(refitTerminal);
    };
    sessionListResizerEl.addEventListener("pointermove", onMove);
    sessionListResizerEl.addEventListener("pointerup", onEnd);
    sessionListResizerEl.addEventListener("pointercancel", onEnd);
  });
  sessionListResizerEl.addEventListener("keydown", (ev) => {
    if (ev.key !== "ArrowLeft" && ev.key !== "ArrowRight") return;
    ev.preventDefault();
    const delta = ev.key === "ArrowRight" ? 16 : -16;
    setSessionListWidth(currentSessionListWidth() + delta);
    if (state.mode === "terminal") requestAnimationFrame(refitTerminal);
  });
}

window.addEventListener("resize", () => {
  setSessionListWidth(currentSessionListWidth(), false);
  const storedVisible = localStorage.getItem(SESSION_LIST_VISIBLE_KEY);
  setSessionListVisible(storedVisible !== "0", false);
});

// --- Transcript rendering -------------------------------------------------

function transcriptPaneForSession(id) {
  if (!id) return null;
  let pane = state.transcriptPaneById.get(id);
  if (!pane) {
    pane = document.createElement("div");
    pane.className = "transcript-pane";
    pane.hidden = true;
    pane.dataset.sessionId = id;
    transcriptEl.appendChild(pane);
    state.transcriptPaneById.set(id, pane);
  }
  return pane;
}

function showTranscriptPane(id) {
  const next = transcriptPaneForSession(id);
  for (const pane of state.transcriptPaneById.values()) {
    pane.hidden = pane !== next;
  }
  activeTranscriptEl = next;
  return next;
}

function clearTranscriptPane(id) {
  const pane = state.transcriptPaneById.get(id);
  if (pane) {
    pane.innerHTML = "";
    delete pane.dataset.loaded;
  }
}

function transcriptTarget(sessionId = state.currentId) {
  if (activeTranscriptEl) return activeTranscriptEl;
  if (sessionId) return transcriptPaneForSession(sessionId);
  return transcriptEl;
}

async function loadTranscript(id) {
  const pane = showTranscriptPane(id);
  if (pane.dataset.loaded === "true") return;
  pane.innerHTML = "";
  state.byId.set(id, []);
  let result;
  try {
    result = await rpc("session.transcript", { session_id: id, from: 0 });
  } catch (e) {
    appendError(`failed to load transcript: ${e.message}`);
    return;
  }
  const events = (result && result.events) || [];
  for (const te of events) renderEvent(te.event, te.at);
  pane.dataset.loaded = "true";
  scrollToBottom({ force: true });
}

function handleNotification(method, params) {
  if (method === "session/event") {
    const { session_id, event } = params;
    // Tool-approval requests are interactive and time-sensitive —
    // surface them in the bottom sheet regardless of which session
    // is currently being viewed. The session_id sticks with the
    // queued entry so the eventual `tool_decision` RPC routes back
    // to the right session even if the user switches views.
    if (event && event.type === "tool_approval_request" && event.call_id) {
      enqueueApproval(session_id, event);
    }
    if (event && event.type === "browser_preview") {
      setBrowserPreview(session_id, event);
    }
    if (event && event.type === "pty") observeSessionPtyActivity(session_id, params.at);
    if (event && event.type === "agent_status") {
      if (event.active) state.agentStatusById.set(session_id, event);
      else state.agentStatusById.delete(session_id);
    }
    if (session_id !== state.currentId) return;
    if (state.mode === "chat") showTranscriptPane(session_id);
    renderEvent(event, params.at);
    scrollToBottom();
  } else if (method === "session/state") {
    const { session } = params;
    if (!session) return;
    // Patch the cached summary so the list re-renders with new
    // state. Update in place rather than refetching.
    const i = state.sessions.findIndex((s) => s.id === session.id);
    if (i >= 0) state.sessions[i] = session;
    else state.sessions.push(session);
    renderSessions();
    if (session.id === state.currentId) {
      sessionTitleEl.textContent = sessionViewTitle(session);
    }
  } else if (method === "session/deleted") {
    state.sessions = state.sessions.filter((s) => s.id !== params.session_id);
    renderSessions();
    state.editorById.delete(params.session_id);
    state.agentStatusById.delete(params.session_id);
    state.ptyActivityById.delete(params.session_id);
    clearBrowserPreview(params.session_id);
    if (params.session_id === state.currentId) {
      state.currentId = null;
      clearTranscriptPane(params.session_id);
      renderEditorState(null);
      renderBrowserPreviewForSession(null);
      sessionTitleEl.textContent = "";
      refreshListToolbar();
    }
  } else if (method === "group/state" || method === "project/state") {
    const group = params.group || params.project;
    if (!group) return;
    const i = state.groups.findIndex((g) => g.id === group.id);
    if (i >= 0) state.groups[i] = group;
    else state.groups.push(group);
    renderSessions();
  } else if (method === "group/deleted" || method === "project/deleted") {
    const deletedId = params.group_id || params.project_id;
    state.groups = state.groups.filter((g) => g.id !== deletedId);
    renderSessions();
  }
}

function renderEvent(event, at) {
  if (!event || !event.type) return;
  if (event.type === "browser_preview") {
    // Ephemeral, live-only: never resurrected from the transcript on
    // (re)load. The live WS notification path (`handleNotification`) is
    // the sole setter; here we just skip so a stale historical preview
    // doesn't pop back up, and so it doesn't fall through to PTY.
    return;
  }
  // PTY events go to xterm in terminal mode (decoded raw bytes →
  // term.write); fall through to the chat-style `appendPty`
  // otherwise so the user still sees something for non-PTY views.
  if (event.type === "pty") {
    if (state.mode === "terminal" && state.term) {
      // Bytes (not a pre-decoded string) so xterm's streaming
      // UTF-8 decoder owns multi-byte boundaries — critical at
      // narrow PTY widths where a single glyph can straddle two
      // Pty events, otherwise renders as "random chars".
      const bytes = decodeBase64ToBytes(event.data || "");
      if (state.ptyBuffering) state.ptyBuffer.push(bytes);
      else writeLivePtyToTerm(bytes);
    } else {
      // Chat-mode fallback (non-PTY session that still emits Pty
      // events — uncommon but possible). One-shot decode with
      // TextDecoder + fatal:false; cross-chunk split sequences
      // get a single U+FFFD instead of dumping the base64 string.
      appendPty(decodeBase64(event.data || ""));
    }
    return;
  }
  // In terminal mode we deliberately skip the structured rendering
  // for everything except `reset` and `error` — those are useful
  // signals that wouldn't otherwise reach the terminal surface. The
  // PTY itself already paints the rest.
  if (state.mode === "terminal") {
    if (event.type === "editor_state") {
      state.editorById.set(state.currentId, event);
      renderEditorStateForSession(state.currentId);
    }
    if (event.type === "agent_status") {
      if (event.active) state.agentStatusById.set(state.currentId, event);
      else state.agentStatusById.delete(state.currentId);
      renderEditorStateForSession(state.currentId);
    }
    if (event.type === "reset") {
      if (state.term) state.term.reset();
      state.editorById.delete(state.currentId);
      state.agentStatusById.delete(state.currentId);
      clearBrowserPreview(state.currentId);
      renderEditorState(null);
    }
    if (event.type === "error" && state.term) {
      state.term.write(`\r\n\x1b[31m[error] ${event.message || ""}\x1b[0m\r\n`);
    }
    // Tool calls (Zarvis): unlike codex/claude, Zarvis does NOT paint
    // tool blocks into its PTY stream — it emits structured tool_use /
    // tool_result events and the desktop TUI synthesizes the block. So
    // the xterm view would show nothing for tool calls. Synthesize an
    // inline rendering here, in event order with the surrounding PTY
    // prose. (issue #134)
    if (event.type === "tool_use") {
      writeToTerm(toolUseLine(event.tool, event.args));
    }
    if (event.type === "tool_result") {
      writeToTerm(toolResultLines(event.ok, event.output));
    }
    if (event.type === "tool_approval_request") {
      const risk = event.risk ? ` [${sanitizeForTerm(event.risk)}]` : "";
      writeToTerm(
        `\r\n\x1b[1;33m? approve${risk}\x1b[0m ${sanitizeForTerm(event.tool || "")}` +
          `\x1b[2m(${sanitizeForTerm(event.args_summary || "")})\x1b[0m\r\n`
      );
    }
    return;
  }
  switch (event.type) {
    case "message":
      appendMessage(event.role || "assistant", event.text || "");
      break;
    case "tool_use":
      appendToolUse(event.tool, event.args);
      break;
    case "tool_result":
      appendToolResult(event.tool, event.ok, event.output);
      break;
    case "error":
      appendError(event.message || "(error)");
      break;
    case "status":
      // Lifecycle/status events drive list chrome and terminal/editor
      // state. Rendering them as chat rows makes resumed headless
      // sessions accumulate noisy "awaiting_input" / "running - model"
      // lines at the bottom of the transcript.
      break;
    case "reset":
      clearTranscriptPane(state.currentId);
      state.editorById.delete(state.currentId);
      state.agentStatusById.delete(state.currentId);
      clearBrowserPreview(state.currentId);
      renderEditorState(null);
      break;
    case "editor_state":
      state.editorById.set(state.currentId, event);
      renderEditorStateForSession(state.currentId);
      break;
    case "agent_status":
      if (event.active) state.agentStatusById.set(state.currentId, event);
      else state.agentStatusById.delete(state.currentId);
      renderEditorStateForSession(state.currentId);
      break;
    case "tool_approval_request":
      // Render as a tool-use card; v1 doesn't yet implement
      // approve/deny from mobile, but seeing it requested is
      // already useful signal.
      appendToolApproval(event);
      break;
    // Quietly ignore: cost, task_*,
    // context_compacted, diff, awaiting_input, done. These map
    // onto richer chrome in the desktop TUI; Phase 2 surfaces
    // only message + tool + raw PTY. A small "(<type>)" line on
    // unknown variants helps debugging without being noisy.
    default:
      // Skip silently.
      break;
  }
}

function renderEditorStateForSession(id) {
  renderEditorState(state.editorById.get(id) || null, state.agentStatusById.get(id) || null);
}

function renderEditorState(event, agentStatus = null) {
  if ((!event && !agentStatus) || state.mode !== "terminal") {
    editorStateEl.hidden = true;
    editorStateEl.innerHTML = "";
    return;
  }
  const queued = Array.isArray(event && event.queued) ? event.queued : [];
  const completions = Array.isArray(event && event.completions) ? event.completions : [];
  const buf = String((event && event.buf) || "");
  const cursor = Math.max(0, Math.min(Number((event && event.cursor) || 0), Array.from(buf).length));
  const active = editorLineHtml("❯", buf, cursor, false);
  const queuedRows = queued.map((q) => editorLineHtml("↥", String(q), null, true)).join("");
  const statusRow = agentStatus && agentStatus.active
    ? `<div class="editor-agent-status">${escape(agentStatus.status || "Working")}.. ${escape(formatElapsed(agentStatus.started_at_ms || 0))}</div>`
    : "";
  const completionRow = completions.length
    ? `<div class="editor-completions">${escape(completions.join("  "))}</div>`
    : "";
  editorStateEl.innerHTML = statusRow + queuedRows + active + completionRow;
  editorStateEl.hidden = false;
}

function formatElapsed(startedAtMs) {
  const start = Number(startedAtMs) || 0;
  if (start <= 0) return "0s";
  const elapsed = Math.max(0, Math.floor((Date.now() - start) / 1000));
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;
  return mins > 0 ? `${mins}m${String(secs).padStart(2, "0")}s` : `${secs}s`;
}

function editorLineHtml(prompt, text, cursor, queued) {
  const chars = Array.from(text);
  let body;
  if (cursor == null) {
    body = escape(text);
  } else {
    const before = chars.slice(0, cursor).join("");
    const at = chars[cursor] || " ";
    const after = chars.slice(cursor + 1).join("");
    body = `${escape(before)}<span class="editor-cursor">${escape(at)}</span>${escape(after)}`;
  }
  const cls = queued ? "editor-row editor-queued" : "editor-row";
  return `<div class="${cls}"><span class="editor-prompt">${escape(prompt)}</span><span class="editor-text">${body}</span></div>`;
}

function appendMessage(role, text) {
  const target = transcriptTarget();
  const normalizedRole = role || "assistant";
  if (normalizedRole === "assistant") {
    const last = target.lastElementChild;
    if (
      last &&
      last.classList.contains("row") &&
      last.dataset.kind === "message" &&
      last.dataset.role === normalizedRole
    ) {
      last.querySelector(".bubble").textContent += text;
      return;
    }
  }
  const row = document.createElement("div");
  row.className = `row role-${escape(normalizedRole)}`;
  row.dataset.kind = "message";
  row.dataset.role = normalizedRole;
  row.innerHTML = `
    <div class="meta">${escape(normalizedRole)}</div>
    <div class="bubble"></div>`;
  row.querySelector(".bubble").textContent = text;
  target.appendChild(row);
}

// --- terminal-mode tool-call synthesis (issue #134) ----------------------
// Zarvis emits tool calls as structured events, not PTY bytes. Render an
// inline xterm representation that mirrors the desktop TUI's tool block.

// Strip ESC + other control bytes from agent-supplied text so a tool
// name / args / output can't inject cursor moves or colors into xterm.
function sanitizeForTerm(s) {
  return String(s ?? "").replace(/[\x00-\x1f\x7f]/g, " ");
}

// One-line summary of a tool's args object for the `→ tool(...)` header.
function summarizeToolArgs(args) {
  if (args == null) return "";
  let s;
  if (typeof args === "string") {
    s = args;
  } else if (typeof args === "object") {
    s = Object.entries(args)
      .map(([k, v]) => `${k}: ${typeof v === "string" ? v : JSON.stringify(v)}`)
      .join(", ");
  } else {
    s = String(args);
  }
  s = sanitizeForTerm(s);
  return s.length > 120 ? s.slice(0, 117) + "…" : s;
}

function toolUseLine(tool, args) {
  const summary = summarizeToolArgs(args);
  const argPart = summary ? `\x1b[2m(${summary})\x1b[0m` : "";
  return `\r\n\x1b[1;32m→ ${sanitizeForTerm(tool || "tool")}\x1b[0m${argPart}\r\n`;
}

function toolResultLines(ok, output) {
  const glyph = ok === false ? "\x1b[1;31m✗\x1b[0m" : "\x1b[1;32m✓\x1b[0m";
  const lines = String(output ?? "").split("\n");
  const first = lines[0] ? sanitizeForTerm(lines[0]).slice(0, 200) : "(no output)";
  let out = `  ${glyph}  \x1b[2m${first}\x1b[0m\r\n`;
  const extra = lines.length - 1;
  if (extra > 0) {
    out += `     \x1b[2;36m[+${extra} more line${extra === 1 ? "" : "s"}]\x1b[0m\r\n`;
  }
  return out;
}

// Write to xterm, respecting the pty_replay buffering window so a tool
// event that lands mid-replay stays ordered with the buffered PTY chunks.
function writeToTerm(s) {
  if (state.ptyBuffering) state.ptyBuffer.push(s);
  else writeLivePtyToTerm(s);
}

// Hydrate the terminal from a session's transcript (used for zarvis,
// whose tool blocks aren't in the PTY stream). Writes PTY prose and
// synthesized tool blocks in chronological order, directly to xterm —
// this is the historical baseline, so it bypasses the live-event
// `ptyBuffer` (which is flushed afterwards). Prose-bearing structured
// events (message / reasoning) are skipped: their text is already in
// the PTY events.
function replayTranscriptToTerm(events) {
  if (!state.term) return;
  for (const te of events) {
    const e = te && te.event;
    if (!e || !e.type) continue;
    switch (e.type) {
      case "pty":
        state.term.write(decodeBase64ToBytes(e.data || ""));
        break;
      case "tool_use":
        state.term.write(toolUseLine(e.tool, e.args));
        break;
      case "tool_result":
        state.term.write(toolResultLines(e.ok, e.output));
        break;
      case "editor_state":
        state.editorById.set(state.currentId, e);
        break;
      case "agent_status":
        if (e.active) state.agentStatusById.set(state.currentId, e);
        else state.agentStatusById.delete(state.currentId);
        break;
      // browser_preview: ephemeral, live-only — deliberately NOT replayed
      // from the historical transcript (it would resurrect a stale
      // thumbnail on reload). The live WS path is the sole setter.
      // message / reasoning / status / cost / …: prose is already in
      // the PTY events; structured chrome isn't shown in terminal mode.
    }
  }
}

function appendToolUse(tool, args) {
  const target = transcriptTarget();
  const row = document.createElement("div");
  row.className = "row";
  const argStr = args === undefined ? "" : tryStringify(args);
  row.innerHTML = `
    <div class="tool">
      <span class="tool-name">→ ${escape(tool || "tool")}</span>
      ${argStr ? `<details><summary>args</summary><pre></pre></details>` : ""}
    </div>`;
  if (argStr) row.querySelector("pre").textContent = argStr;
  target.appendChild(row);
}

function appendToolResult(tool, ok, output) {
  const target = transcriptTarget();
  const row = document.createElement("div");
  row.className = "row";
  const badge = ok ? '<span class="badge ok">ok</span>' : '<span class="badge err">err</span>';
  row.innerHTML = `
    <div class="tool">
      <span class="tool-name">← ${escape(tool || "tool")}</span>${badge}
      ${output ? `<details><summary>output</summary><pre></pre></details>` : ""}
    </div>`;
  if (output) row.querySelector("pre").textContent = output;
  target.appendChild(row);
}

function appendToolApproval(event) {
  const target = transcriptTarget();
  const row = document.createElement("div");
  row.className = "row";
  row.innerHTML = `
    <div class="tool">
      <span class="tool-name">⚠ approval requested: ${escape(event.tool || "")}</span>
      <span class="badge">${escape(event.risk || "")}</span>
      <details open><summary>${escape(event.args_summary || "args")}</summary></details>
    </div>`;
  target.appendChild(row);
}

function appendPty(text) {
  // Coalesce consecutive PTY rows so each frame doesn't create a
  // new DOM block; matters for chatty interactive harnesses.
  const target = transcriptTarget();
  const last = target.lastElementChild;
  if (last && last.classList.contains("row") && last.dataset.kind === "pty") {
    last.querySelector("pre").textContent += text;
    return;
  }
  const row = document.createElement("div");
  row.className = "row";
  row.dataset.kind = "pty";
  row.innerHTML = `<pre class="pty"></pre>`;
  row.querySelector("pre").textContent = text;
  target.appendChild(row);
}

function appendError(msg) {
  const target = transcriptTarget();
  const row = document.createElement("div");
  row.className = "row";
  row.innerHTML = `<div class="error"></div>`;
  row.querySelector(".error").textContent = msg;
  target.appendChild(row);
}

function scrollToBottom(options = {}) {
  // Initial transcript hydration should always land at the latest
  // content. Live events only auto-scroll if we're already near the
  // bottom — otherwise a user reading earlier content keeps their
  // place when new events arrive.
  const force = !!options.force;
  const target = transcriptTarget();
  const nearBottom =
    target.scrollHeight - target.scrollTop - target.clientHeight < 80;
  if (force || nearBottom) target.scrollTop = target.scrollHeight;
}

// --- Composer ------------------------------------------------------------
//
// Two submit paths:
//
//   Insert — type the composer text into the session as
//            keystrokes. For PTY sessions this lands in the
//            editor / readline buffer without firing Enter, so
//            the user can keep editing in xterm. For non-PTY
//            chat sessions there's no editor to land in, so we
//            fall back to `session.input` (which submits).
//
//   Enter  — same as Insert but with a trailing `\r` for PTY
//            sessions, so the buffer also submits. For non-PTY
//            sessions, identical to Insert (`session.input`
//            already submits).
//
// Form `submit` event fires from Enter button (it's
// `type="submit"`) and from Enter-key-in-textarea via the
// keydown handler. Insert button is `type="button"` so it never
// submits the form.

composerEl.addEventListener("submit", (ev) => {
  ev.preventDefault();
  submitComposer({ enter: true });
});
insertBtn.addEventListener("click", (ev) => {
  ev.preventDefault();
  submitComposer({ enter: false });
});

inputEl.addEventListener("keydown", (ev) => {
  if (ev.key === "Enter" && !ev.shiftKey && !ev.isComposing) {
    ev.preventDefault();
    submitComposer({ enter: true });
  }
});

inputEl.addEventListener("input", () => {
  // Auto-grow the textarea so multi-line composing isn't a tiny
  // single-row box.
  resetInputHeight();
});

inputEl.addEventListener("paste", (ev) => {
  handleComposerPaste(ev).catch((e) => appendError(`paste failed: ${e.message}`));
});

function resetInputHeight() {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, window.innerHeight * 0.3) + "px";
}

async function handleComposerPaste(ev) {
  if (!state.currentId || !state.ws || state.ws.readyState !== 1) return;
  const items = Array.from((ev.clipboardData && ev.clipboardData.items) || []);
  const clipboardFiles = Array.from((ev.clipboardData && ev.clipboardData.files) || []);
  const files = items
    .filter((item) => item.kind === "file")
    .map((item) => item.getAsFile())
    .filter(Boolean);
  if (files.length === 0) files.push(...clipboardFiles);
  if (files.length > 0) {
    ev.preventDefault();
    const refs = [];
    for (const file of files) refs.push(await attachClipboardFile(file));
    insertComposerText(refs.join(" "));
    return;
  }

  const text = ev.clipboardData && ev.clipboardData.getData("text/plain");
  if (text && text.length >= LARGE_TEXT_PASTE_CHARS) {
    ev.preventDefault();
    const ref = await attachClipboardBytes({
      bytes: new TextEncoder().encode(text),
      filename: "clipboard.txt",
      mime: "text/plain",
    });
    insertComposerText(ref);
  }
}

async function attachClipboardFile(file) {
  const bytes = new Uint8Array(await file.arrayBuffer());
  return attachClipboardBytes({
    bytes,
    filename: file.name || "clipboard",
    mime: file.type || null,
  });
}

async function attachClipboardBytes({ bytes, filename, mime }) {
  const result = await rpc("session.attach_clipboard", {
    session_id: state.currentId,
    data: bytesToBase64(bytes),
    filename,
    mime,
  });
  return result.reference || `[#file:${result.path}]`;
}

function insertComposerText(text) {
  const start = inputEl.selectionStart ?? inputEl.value.length;
  const end = inputEl.selectionEnd ?? start;
  const before = inputEl.value.slice(0, start);
  const after = inputEl.value.slice(end);
  const prefix = before && !/\s$/.test(before) ? " " : "";
  const suffix = after && !/^\s/.test(after) ? " " : "";
  const insert = `${prefix}${text}${suffix}`;
  inputEl.value = before + insert + after;
  const pos = before.length + insert.length;
  inputEl.setSelectionRange(pos, pos);
  resetInputHeight();
}

function bytesToBase64(bytes) {
  let binary = "";
  const chunk = 0x8000;
  for (let i = 0; i < bytes.length; i += chunk) {
    binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
  }
  return btoa(binary);
}

function currentSessionHasPty() {
  const s = state.sessions.find((x) => x.id === state.currentId);
  return isTerminalSession(s);
}

/** Insert vs Enter — see the comment on the Composer section. */
async function submitComposer({ enter }) {
  const text = inputEl.value;
  if (!state.currentId) return;
  // Empty Insert is a no-op. Empty Enter on a PTY session is
  // meaningful (sends a bare `\r`), so allow it there.
  if (!text && !(enter && currentSessionHasPty())) return;
  inputEl.value = "";
  resetInputHeight();
  const pty = currentSessionHasPty();
  if (pty) {
    if (state.mode === "terminal") claimTerminalGeometryNow();
    const payload = enter ? text + "\r" : text;
    const data = encodeBase64Utf8(payload);
    try {
      await rpc("session.pty_input", { session_id: state.currentId, data });
    } catch (e) {
      appendError(`pty_input failed: ${e.message}`);
    }
  } else {
    // Non-PTY chat sessions: only `session.input` makes sense.
    // Insert and Enter both submit. The daemon persists and broadcasts
    // the canonical user message; rendering an optimistic copy here
    // duplicates that row in headless sessions.
    if (!text.trim()) return;
    try {
      await rpc("session.input", { session_id: state.currentId, text });
    } catch (e) {
      appendError(`send failed: ${e.message}`);
    }
  }
}

// --- Tiny helpers --------------------------------------------------------

function isHeadlessSession(s) {
  return !!(s && String(s.mode || "").toLowerCase() === "headless");
}

function isTerminalSession(s) {
  return !!(s && s.has_pty && !isHeadlessSession(s));
}

// Zarvis renders tool calls as structured events, not PTY bytes (codex /
// claude / shell paint their own tool UI into the PTY). For those
// sessions the xterm view is hydrated from the transcript — which
// interleaves PTY prose with the tool events — instead of the
// `pty_replay` screen snapshot, so past tool calls show on switch.
// Mirrors the desktop TUI's transcript-preferred hydration. (issue #134)
function isStructuredToolSession(s) {
  return !!(s && s.harness === "zarvis");
}

function sessionHarnessLabel(s) {
  const harness = (s && s.harness) || "";
  return isHeadlessSession(s) && harness ? `(headless) ${harness}` : harness;
}

function sessionDisplayTitle(s) {
  if (!s) return "";
  return s.title || sessionHarnessLabel(s) || s.id.slice(0, 8);
}

function sessionViewTitle(s) {
  if (!s) return "";
  const title = sessionDisplayTitle(s);
  const harness = sessionHarnessLabel(s);
  return s.title && harness ? `${title} — ${harness}` : title;
}

function escape(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}
function attr(s) {
  return escape(s).replace(/"/g, "&quot;");
}
function tryStringify(v) {
  try { return JSON.stringify(v, null, 2); } catch { return String(v); }
}
/** Decode a base64 string to a `Uint8Array`. Caller is responsible
 *  for downstream UTF-8 handling — for xterm.js we pass these
 *  bytes directly so xterm's internal streaming decoder can stitch
 *  partial multi-byte sequences across chunks; for the chat-mode
 *  `<pre>` fallback we run them through `TextDecoder`. */
function decodeBase64ToBytes(s) {
  try {
    const bin = atob(s);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  } catch {
    return new Uint8Array(0);
  }
}

/** Decode a base64 string to a UTF-8 `String`. Uses `TextDecoder`
 *  with `fatal:false` so split multi-byte sequences (the
 *  narrow-PTY case) produce a single U+FFFD replacement character
 *  instead of throwing — the old `decodeURIComponent` pipeline
 *  threw and dumped the raw base64 as fallback, which is what
 *  showed as "random chars" in the narrow-width screenshots. */
function decodeBase64(s) {
  return new TextDecoder("utf-8", { fatal: false }).decode(decodeBase64ToBytes(s));
}

// --- Tool approval sheet ------------------------------------------------

/**
 * Queue a fresh approval request. The bottom sheet pops up if it
 * isn't already showing one; otherwise the request waits in line.
 */
function enqueueApproval(sessionId, event) {
  state.approvalQueue.push({
    session_id: sessionId,
    call_id: event.call_id,
    tool: event.tool || "tool",
    args_summary: event.args_summary || "",
    risk: event.risk || "",
  });
  if (!state.approvalShown) showNextApproval();
  else updateApprovalQueueHint();
}

function showNextApproval() {
  const next = state.approvalQueue.shift();
  if (!next) {
    state.approvalShown = null;
    approvalSheetEl.hidden = true;
    return;
  }
  state.approvalShown = next;
  approvalToolNameEl.textContent = next.tool;
  approvalRiskEl.textContent = next.risk || "";
  approvalRiskEl.classList.remove("safe", "risky");
  if (next.risk === "safe" || next.risk === "risky") {
    approvalRiskEl.classList.add(next.risk);
  }
  approvalSummaryEl.textContent = next.args_summary || "(no args)";
  setApprovalButtonsDisabled(false);
  updateApprovalQueueHint();
  approvalSheetEl.hidden = false;
}

function updateApprovalQueueHint() {
  const n = state.approvalQueue.length;
  if (n > 0) {
    approvalQueueHintEl.textContent =
      `${n} more request${n === 1 ? "" : "s"} queued`;
    approvalQueueHintEl.hidden = false;
  } else {
    approvalQueueHintEl.hidden = true;
  }
}

function setApprovalButtonsDisabled(disabled) {
  approvalDenyBtn.disabled = disabled;
  approvalApproveBtn.disabled = disabled;
  approvalAutomodeBtn.disabled = disabled;
}

async function decideApproval(decision) {
  const pending = state.approvalShown;
  if (!pending) return;
  setApprovalButtonsDisabled(true);
  try {
    await rpc("session.tool_decision", {
      session_id: pending.session_id,
      call_id: pending.call_id,
      decision,
    });
  } catch (e) {
    // Surface the failure so the user can retry. The next approval
    // doesn't auto-advance — the user re-decides this one.
    appendError(`tool_decision failed: ${e.message}`);
    setApprovalButtonsDisabled(false);
    return;
  }
  showNextApproval();
}

approvalApproveBtn.addEventListener("click", () => decideApproval("approve"));
approvalDenyBtn.addEventListener("click", () => decideApproval("deny"));
approvalAutomodeBtn.addEventListener("click", () => decideApproval("automode"));

// --- New-session dialog -------------------------------------------------

const newSessionBtn = $("newSessionBtn");
const newSessionSheetEl = $("newSessionSheet");
const newSessionFormEl = $("newSessionForm");
const newSessionHarnessEl = $("newSessionHarness");
const newSessionCwdEl = $("newSessionCwd");
const newSessionPromptEl = $("newSessionPrompt");
const newSessionErrorEl = $("newSessionError");
const newSessionCancelBtn = $("newSessionCancel");
const newSessionCreateBtn = $("newSessionCreate");

async function openNewSessionDialog() {
  // Populate the harness dropdown from `harness.list`. Filtered to
  // available harnesses so the user can't pick one that the daemon
  // would reject.
  let harnesses = [];
  try {
    harnesses = await rpc("harness.list", null);
    state.harnesses = Array.isArray(harnesses) ? harnesses : [];
  } catch (e) {
    newSessionErrorEl.textContent = `harness.list failed: ${e.message}`;
    newSessionErrorEl.hidden = false;
    newSessionSheetEl.hidden = false;
    return;
  }
  const usable = state.harnesses.filter((h) => h.available);
  if (!usable.length) {
    newSessionErrorEl.textContent = "no harnesses available on this daemon";
    newSessionErrorEl.hidden = false;
  } else {
    newSessionErrorEl.hidden = true;
  }
  newSessionHarnessEl.innerHTML = usable
    .map((h) => `<option value="${attr(h.name)}">${escape(h.name)}</option>`)
    .join("");
  // Pre-fill cwd with the current session's cwd if we have one
  // (keeps the new session in the same project context).
  const cur = state.sessions.find((s) => s.id === state.currentId);
  newSessionCwdEl.value = (cur && cur.cwd) || "";
  newSessionPromptEl.value = "";
  newSessionSheetEl.hidden = false;
  // Defer focus so the slide-up animation doesn't fight the
  // keyboard-summon path.
  setTimeout(() => newSessionHarnessEl.focus(), 200);
}

function closeNewSessionDialog() {
  newSessionSheetEl.hidden = true;
  newSessionErrorEl.hidden = true;
  newSessionCreateBtn.disabled = false;
}

function currentTerminalSize() {
  if (state.term && state.fitAddon) {
    fitTerminalPreservingScroll();
    if (state.term.cols && state.term.rows) {
      return { cols: state.term.cols, rows: state.term.rows };
    }
  }
  return { cols: 100, rows: 30 };
}

async function submitNewSession(ev) {
  ev.preventDefault();
  const harness = newSessionHarnessEl.value;
  const cwd = newSessionCwdEl.value.trim();
  const prompt = newSessionPromptEl.value.trim();
  if (!harness) {
    newSessionErrorEl.textContent = "pick a harness";
    newSessionErrorEl.hidden = false;
    return;
  }
  if (!cwd) {
    newSessionErrorEl.textContent = "cwd is required";
    newSessionErrorEl.hidden = false;
    return;
  }
  newSessionCreateBtn.disabled = true;
  newSessionErrorEl.hidden = true;
  const params = { harness, cwd };
  if (prompt) params.prompt = prompt;
  const info = state.harnesses.find((h) => h.name === harness);
  if (info && info.capabilities && info.capabilities.supports_pty) {
    params.mode = "interactive";
    params.pty_size = currentTerminalSize();
  }
  try {
    const res = await rpc("session.create", params);
    closeNewSessionDialog();
    // session/state notifications will repopulate the list; also
    // auto-select the new session so the user sees it immediately.
    if (res && res.session_id) {
      await refreshSessions();
      selectSession(res.session_id);
    }
  } catch (e) {
    newSessionCreateBtn.disabled = false;
    newSessionErrorEl.textContent = `create failed: ${e.message}`;
    newSessionErrorEl.hidden = false;
  }
}

newSessionBtn.addEventListener("click", openNewSessionDialog);
newSessionCancelBtn.addEventListener("click", closeNewSessionDialog);
newSessionFormEl.addEventListener("submit", submitNewSession);

// --- Rename-session dialog ---------------------------------------------
//
// Single text input; submitting empty clears the user-set title
// (the daemon falls back to its hash-derived label). State held
// on the form element so we don't accidentally rename the wrong
// session if the selection changes while the sheet is open.

const renameSheetEl = $("renameSheet");
const renameFormEl = $("renameForm");
const renameTitleEl = $("renameTitle");
const renameErrorEl = $("renameError");
const renameCancelBtn = $("renameCancel");
const renameSaveBtn = $("renameSave");

function openRenameDialog(sessionId) {
  const s = state.sessions.find((x) => x.id === sessionId);
  if (!s) return;
  renameFormEl.dataset.sessionId = sessionId;
  renameTitleEl.value = s.title || "";
  renameErrorEl.hidden = true;
  renameSaveBtn.disabled = false;
  renameSheetEl.hidden = false;
  setTimeout(() => {
    renameTitleEl.focus();
    renameTitleEl.select();
  }, 200);
}

function closeRenameDialog() {
  renameSheetEl.hidden = true;
  renameErrorEl.hidden = true;
  renameSaveBtn.disabled = false;
  delete renameFormEl.dataset.sessionId;
}

async function submitRename(ev) {
  ev.preventDefault();
  const sessionId = renameFormEl.dataset.sessionId;
  if (!sessionId) {
    closeRenameDialog();
    return;
  }
  const raw = renameTitleEl.value.trim();
  // Empty input → omit `title` so the daemon clears the override
  // (it's an `Option<String>` server-side).
  const params = { session_id: sessionId };
  if (raw) params.title = raw;
  renameSaveBtn.disabled = true;
  renameErrorEl.hidden = true;
  try {
    await rpc("session.set_title", params);
    closeRenameDialog();
  } catch (e) {
    renameSaveBtn.disabled = false;
    renameErrorEl.textContent = `rename failed: ${e.message}`;
    renameErrorEl.hidden = false;
  }
}

renameCancelBtn.addEventListener("click", closeRenameDialog);
renameFormEl.addEventListener("submit", submitRename);
renameSheetEl.addEventListener("click", (ev) => {
  // Click on the backdrop (the sheet itself, not the card) closes.
  if (ev.target === renameSheetEl) closeRenameDialog();
});

// Shared list toolbar — delegate the click to the same
// `handleRowAction` the per-row buttons used to call. After the
// action, `session/state` notifications refresh the cached
// summary and re-render the list (which calls
// `refreshListToolbar` for us).
$("listToolbar").addEventListener("click", (ev) => {
  const btn = ev.target.closest("[data-action]");
  if (!btn || btn.disabled) return;
  handleRowAction(btn.dataset.action, state.currentId);
});

// --- Mobile keyboard awareness ------------------------------------------
//
// When the OS soft keyboard slides up on a phone, `visualViewport`
// shrinks (the actually-visible page area), while the layout
// viewport stays full-size. Without intervention, the bottom of
// our page — including the xterm cursor and our vkbd's special
// row — is hidden behind the OS keyboard and the user has to
// manually scroll up.
//
// Fix: bind `body.height` to `visualViewport.height`. The existing
// flex layout reflows automatically (xterm refits via its
// `ResizeObserver` on `#terminal`, the vkbd stays pinned just
// above the OS keyboard), so the user never sees the cursor
// disappear behind the OS keyboard. Setting `body.height` is also
// a no-op on desktop where visualViewport tracks the inner window
// height exactly.

function syncBodyHeightToVisualViewport() {
  if (!window.visualViewport) return;
  const h = Math.round(window.visualViewport.height);
  // Direct style override of the CSS `height: 100%` rule. The
  // existing rule re-applies as soon as we clear this when the
  // keyboard hides (visualViewport.height === innerHeight).
  document.documentElement.style.height = `${h}px`;
  document.body.style.height = `${h}px`;
  // Some mobile browsers keep a non-zero page scroll offset after the
  // keyboard shifts the visual viewport. Resetting it keeps the app shell
  // anchored; terminal scrollback remains inside xterm's own viewport.
  if (window.scrollX || window.scrollY) window.scrollTo(0, 0);
}

if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", syncBodyHeightToVisualViewport);
  window.visualViewport.addEventListener("scroll", syncBodyHeightToVisualViewport);
  // Run once at boot to handle the case where the page is loaded
  // with an already-open keyboard (rare but possible after
  // page-refresh while focused).
  syncBodyHeightToVisualViewport();
}

// --- Boot ---------------------------------------------------------------

initMiniMatrix();
connect();
</script>
</body>
